<svg viewBox="0 0 800 1100" xmlns="http://www.w3.org/2000/svg">
  <!-- Define styles -->
  <defs>
    <style>
      .box { fill: #e3f2fd; stroke: #1565c0; stroke-width: 2.5; }
      .input { fill: #fff3e0; stroke: #e65100; stroke-width: 2.5; }
      .process { fill: #f3e5f5; stroke: #6a1b9a; stroke-width: 2.5; }
      .decision { fill: #fff9c4; stroke: #f57f17; stroke-width: 2.5; }
      .output { fill: #e8f5e9; stroke: #2e7d32; stroke-width: 2.5; }
      .text { font-family: 'Times New Roman', serif; font-size: 13px; text-anchor: middle; fill: #000; }
      .text-small { font-family: 'Times New Roman', serif; font-size: 11px; text-anchor: middle; fill: #333; }
      .text-label { font-family: 'Times New Roman', serif; font-size: 12px; fill: #000; font-weight: bold; }
      .arrow { stroke: #000; stroke-width: 2.5; fill: none; marker-end: url(#arrowhead); }
      .title { font-family: 'Times New Roman', serif; font-size: 16px; font-weight: bold; text-anchor: middle; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#000" />
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="400" y="25" class="title">Optimization Framework for Early Childhood Daily Routine</text>
  
  <!-- START -->
  <ellipse cx="400" cy="60" rx="70" ry="25" class="box"/>
  <text x="400" y="66" class="text" font-weight="bold">START</text>
  
  <!-- Arrow -->
  <path d="M 400 85 L 400 115" class="arrow"/>
  
  <!-- INPUT PARAMETERS -->
  <rect x="260" y="115" width="280" height="100" rx="8" class="input"/>
  <text x="400" y="138" class="text" font-weight="bold">INPUT PARAMETERS</text>
  <text x="400" y="158" class="text-small">Child age and developmental stage</text>
  <text x="400" y="174" class="text-small">Activity weights (wᵢ) for relative importance</text>
  <text x="400" y="190" class="text-small">Ideal durations (μᵢ) from pediatric guidelines</text>
  <text x="400" y="206" class="text-small">Penalty coefficients (aᵢ) for deviations</text>
  
  <!-- Arrow -->
  <path d="M 400 215 L 400 245" class="arrow"/>
  
  <!-- DEFINE CONSTRAINTS -->
  <rect x="260" y="245" width="280" height="90" rx="8" class="process"/>
  <text x="400" y="268" class="text" font-weight="bold">DEFINE CONSTRAINTS</text>
  <text x="400" y="288" class="text-small">Total time constraint: Σtᵢ = 24 hours (Eq. 2)</text>
  <text x="400" y="304" class="text-small">Activity bounds: Lᵢ ≤ tᵢ ≤ Uᵢ (Eq. 3)</text>
  <text x="400" y="320" class="text-small">Meal structure: tB + tL + tD = t₅ (Eq. 4)</text>
  
  <!-- Arrow -->
  <path d="M 400 335 L 400 365" class="arrow"/>
  
  <!-- FORMULATE OBJECTIVE -->
  <rect x="260" y="365" width="280" height="75" rx="8" class="process"/>
  <text x="400" y="388" class="text" font-weight="bold">FORMULATE QUADRATIC OBJECTIVE</text>
  <text x="400" y="408" class="text-small">Maximize D = Σwᵢ[−aᵢ(tᵢ − μᵢ)² + cᵢ] (Eq. 1)</text>
  <text x="400" y="424" class="text-small">Subject to defined constraints</text>
  
  <!-- Arrow -->
  <path d="M 400 440 L 400 470" class="arrow"/>
  
  <!-- APPLY OPTIMIZATION -->
  <rect x="260" y="470" width="280" height="90" rx="8" class="process"/>
  <text x="400" y="493" class="text" font-weight="bold">APPLY CLASSICAL OPTIMIZATION</text>
  <text x="400" y="513" class="text-small">Sequential Quadratic Programming (SQP)</text>
  <text x="400" y="529" class="text-small">Newton/Quasi-Newton methods</text>
  <text x="400" y="545" class="text-small">Gradient-based approaches</text>
  
  <!-- Arrow -->
  <path d="M 400 560 L 400 590" class="arrow"/>
  
  <!-- COMPUTE SOLUTION -->
  <rect x="260" y="590" width="280" height="70" rx="8" class="process"/>
  <text x="400" y="613" class="text" font-weight="bold">COMPUTE OPTIMAL ALLOCATION</text>
  <text x="400" y="633" class="text-small">Find optimal time allocation t*ᵢ for each</text>
  <text x="400" y="649" class="text-small">activity (i = 1, 2, ..., 6)</text>
  
  <!-- Arrow -->
  <path d="M 400 660 L 400 690" class="arrow"/>
  
  <!-- DECISION DIAMOND -->
  <path d="M 400 690 L 490 750 L 400 810 L 310 750 Z" class="decision"/>
  <text x="400" y="743" class="text" font-weight="bold">All Constraints</text>
  <text x="400" y="760" class="text" font-weight="bold">Satisfied?</text>
  
  <!-- NO arrow (loop back) -->
  <path d="M 310 750 L 210 750 L 210 530 L 260 530" class="arrow"/>
  <text x="200" y="640" class="text-label">No</text>
  
  <!-- YES arrow -->
  <path d="M 400 810 L 400 850" class="arrow"/>
  <text x="430" y="833" class="text-label">Yes</text>
  
  <!-- OPTIMAL SCHEDULE OUTPUT -->
  <rect x="260" y="850" width="280" height="100" rx="8" class="output"/>
  <text x="400" y="873" class="text" font-weight="bold">OPTIMAL DAILY SCHEDULE</text>
  <text x="400" y="893" class="text-small">Sleep: t*₁ hours | Learning: t*₂ hours</text>
  <text x="400" y="909" class="text-small">Physical Play: t*₃ hours | Creative Play: t*₄ hours</text>
  <text x="400" y="925" class="text-small">Meals: t*₅ hours | Hygiene: t*₆ hours</text>
  <text x="400" y="941" class="text-small">with Σt*ᵢ = 24 hours</text>
  
  <!-- Arrow -->
  <path d="M 400 950 L 400 980" class="arrow"/>
  
  <!-- CALCULATE SCORE -->
  <rect x="260" y="980" width="280" height="60" rx="8" class="output"/>
  <text x="400" y="1003" class="text" font-weight="bold">DEVELOPMENTAL SCORE</text>
  <text x="400" y="1023" class="text-small">D* = Σwᵢ[−aᵢ(t*ᵢ − μᵢ)² + cᵢ]</text>
  
  <!-- Arrow to END -->
  <path d="M 400 1040 L 400 1065" class="arrow"/>
  
  <!-- END -->
  <ellipse cx="400" cy="1080" rx="70" ry="25" class="box"/>
  <text x="400" y="1086" class="text" font-weight="bold">END</text>
  
</svg>

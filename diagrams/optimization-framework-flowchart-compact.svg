<svg viewBox="0 0 600 700" xmlns="http://www.w3.org/2000/svg">
  <!-- Define styles -->
  <defs>
    <style>
      .box { fill: #e3f2fd; stroke: #1565c0; stroke-width: 2; }
      .input { fill: #fff3e0; stroke: #e65100; stroke-width: 2; }
      .process { fill: #f3e5f5; stroke: #6a1b9a; stroke-width: 2; }
      .decision { fill: #fff9c4; stroke: #f57f17; stroke-width: 2; }
      .output { fill: #e8f5e9; stroke: #2e7d32; stroke-width: 2; }
      .text { font-family: 'Times New Roman', serif; font-size: 11px; text-anchor: middle; fill: #000; }
      .text-small { font-family: 'Times New Roman', serif; font-size: 9px; text-anchor: middle; fill: #222; }
      .text-label { font-family: 'Times New Roman', serif; font-size: 10px; fill: #000; font-weight: bold; }
      .arrow { stroke: #000; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#000" />
    </marker>
  </defs>
  
  <!-- START -->
  <ellipse cx="300" cy="25" rx="50" ry="18" class="box"/>
  <text x="300" y="30" class="text" font-weight="bold">START</text>
  
  <path d="M 300 43 L 300 63" class="arrow"/>
  
  <!-- INPUT PARAMETERS -->
  <rect x="180" y="63" width="240" height="60" rx="5" class="input"/>
  <text x="300" y="78" class="text" font-weight="bold">INPUT PARAMETERS</text>
  <text x="300" y="92" class="text-small">Weights (wᵢ), Ideal durations (μᵢ),</text>
  <text x="300" y="103" class="text-small">Penalty coefficients (aᵢ), Activity bounds</text>
  <text x="300" y="114" class="text-small">from pediatric guidelines</text>
  
  <path d="M 300 123 L 300 143" class="arrow"/>
  
  <!-- DEFINE CONSTRAINTS -->
  <rect x="180" y="143" width="240" height="52" rx="5" class="process"/>
  <text x="300" y="158" class="text" font-weight="bold">DEFINE CONSTRAINTS</text>
  <text x="300" y="172" class="text-small">Σtᵢ = 24 hrs, Lᵢ ≤ tᵢ ≤ Uᵢ (Eq. 2,3)</text>
  <text x="300" y="183" class="text-small">Meal structure: tB + tL + tD = t₅ (Eq. 4)</text>
  
  <path d="M 300 195 L 300 215" class="arrow"/>
  
  <!-- FORMULATE OBJECTIVE -->
  <rect x="180" y="215" width="240" height="48" rx="5" class="process"/>
  <text x="300" y="230" class="text" font-weight="bold">QUADRATIC OBJECTIVE</text>
  <text x="300" y="244" class="text-small">Max D = Σwᵢ[−aᵢ(tᵢ−μᵢ)² + cᵢ] (Eq. 1)</text>
  <text x="300" y="255" class="text-small">Subject to constraints</text>
  
  <path d="M 300 263 L 300 283" class="arrow"/>
  
  <!-- APPLY OPTIMIZATION -->
  <rect x="180" y="283" width="240" height="52" rx="5" class="process"/>
  <text x="300" y="298" class="text" font-weight="bold">CLASSICAL OPTIMIZATION</text>
  <text x="300" y="312" class="text-small">SQP, Newton/Quasi-Newton,</text>
  <text x="300" y="323" class="text-small">Gradient-based methods</text>
  
  <path d="M 300 335 L 300 355" class="arrow"/>
  
  <!-- COMPUTE SOLUTION -->
  <rect x="180" y="355" width="240" height="42" rx="5" class="process"/>
  <text x="300" y="370" class="text" font-weight="bold">COMPUTE OPTIMAL t*ᵢ</text>
  <text x="300" y="384" class="text-small">For all activities i = 1,2,...,6</text>
  
  <path d="M 300 397 L 300 420" class="arrow"/>
  
  <!-- DECISION DIAMOND -->
  <path d="M 300 420 L 370 460 L 300 500 L 230 460 Z" class="decision"/>
  <text x="300" y="458" class="text" font-weight="bold">Constraints</text>
  <text x="300" y="471" class="text" font-weight="bold">Satisfied?</text>
  
  <!-- NO arrow (loop back) -->
  <path d="M 230 460 L 160 460 L 160 309 L 180 309" class="arrow"/>
  <text x="155" y="385" class="text-label">No</text>
  
  <!-- YES arrow -->
  <path d="M 300 500 L 300 530" class="arrow"/>
  <text x="318" y="518" class="text-label">Yes</text>
  
  <!-- OPTIMAL SCHEDULE OUTPUT -->
  <rect x="180" y="530" width="240" height="62" rx="5" class="output"/>
  <text x="300" y="545" class="text" font-weight="bold">OPTIMAL SCHEDULE</text>
  <text x="300" y="559" class="text-small">t*₁ (Sleep), t*₂ (Learning), t*₃ (Physical),</text>
  <text x="300" y="570" class="text-small">t*₄ (Creative), t*₅ (Meals), t*₆ (Hygiene)</text>
  <text x="300" y="581" class="text-small">with Σt*ᵢ = 24 hours</text>
  
  <path d="M 300 592 L 300 612" class="arrow"/>
  
  <!-- CALCULATE SCORE -->
  <rect x="180" y="612" width="240" height="40" rx="5" class="output"/>
  <text x="300" y="627" class="text" font-weight="bold">DEVELOPMENTAL SCORE</text>
  <text x="300" y="641" class="text-small">D* = Σwᵢ[−aᵢ(t*ᵢ−μᵢ)² + cᵢ]</text>
  
  <path d="M 300 652 L 300 670" class="arrow"/>
  
  <!-- END -->
  <ellipse cx="300" cy="685" rx="50" ry="18" class="box"/>
  <text x="300" y="690" class="text" font-weight="bold">END</text>
  
</svg>
